server {
    listen 80;
    server_name localhost;

    # Viewer HTML
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Martin serves the PMTiles archives; strip the /tiles/ prefix so
    # /tiles/estonia/{z}/{x}/{y} maps to martin's /estonia/{z}/{x}/{y}.
    location /tiles/ {
        proxy_pass http://martin:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

}
